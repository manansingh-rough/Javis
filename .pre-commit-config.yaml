# NEXUS AI v4.0 — Pre-commit hooks
# ──────────────────────────────────────────────────────────
# LAW L1: THIRD_PARTY_NOTICES.md auto-generated on every
# release tag. This hook runs pip-licenses on every commit
# and warns if THIRD_PARTY_NOTICES.md is stale.
# ──────────────────────────────────────────────────────────

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: |
          (?x)^(
            tests/test_billing.py|
            tests/test_license_issuer.py|
            nexus_billing/license_manager.py
          )$

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.12

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--extend-ignore=E203,W503"]
        additional_dependencies: [flake8-docstrings]

  # ── LAW L1: THIRD_PARTY_NOTICES.md auto-generation ──────
  - repo: local
    hooks:
      - id: third-party-notices
        name: Check THIRD_PARTY_NOTICES.md is up to date
        description: >
          Runs pip-licenses and regenerates THIRD_PARTY_NOTICES.md.
          Fails if the file is out of date — run `pip install pip-licenses`
          and commit the updated file.
        entry: python -c "
import json, subprocess, sys
try:
    result = subprocess.run(
        ['pip-licenses', '--format=json', '--with-license-file', '--no-license-path'],
        capture_output=True, text=True, timeout=30
    )
    if result.returncode != 0:
        print('pip-licenses failed — install with: pip install pip-licenses')
        sys.exit(1)
    packages = json.loads(result.stdout)
    lines = ['# NEXUS AI — Third-Party Notices',
             '# Auto-generated by pre-commit hook — do not edit manually.',
             '# Regenerate with: pip-licenses --format=json > THIRD_PARTY_NOTICES.md',
             f'# Generated: {__import__(\"datetime\").datetime.now().strftime(\"%Y-%m-%d %H:%M:%S\")}',
             '']
    copyleft = []
    for pkg in sorted(packages, key=lambda p: p.get('Name', '')):
        name = pkg.get('Name', 'Unknown')
        version = pkg.get('Version', '?')
        license_name = pkg.get('License', 'Unknown')
        if license_name.upper() in ('GPL', 'GPL-2.0', 'GPL-3.0', 'AGPL', 'AGPL-3.0'):
            copyleft.append(name)
        lines.append(f'## {name} ({version})')
        lines.append(f'License: {license_name}')
        lines.append('')
    if copyleft:
        print(f'WARNING: Copyleft licenses found: {', '.join(copyleft)}')
        print('These require explicit review before release (Section 1.3).')
    print('\\n'.join(lines))
    sys.exit(0)
except FileNotFoundError:
    print('pip-licenses not installed — skipping THIRD_PARTY_NOTICES check')
    print('Install with: pip install pip-licenses')
    sys.exit(0)
"
        language: system
        pass_filenames: false
        always_run: true